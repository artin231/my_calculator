<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Document</title>
</head>

<body>
    <section class="containenr">
        <div class="calc">
            <div class="top">
                <div class="result">
                    <p class="res"></p>
                </div>
            </div>

            <div class="buttons">
                <div class="inner">
                    <div class="nums">
                        <button class="num" type="button">0</button>
                        <button class="num" type="button">1</button>
                        <button class="num" type="button">2</button>
                        <button class="num" type="button">3</button>
                        <button class="num" type="button">4</button>
                        <button class="num" type="button">5</button>
                        <button class="num" type="button">6</button>
                        <button class="num" type="button">7</button>
                        <button class="num" type="button">8</button>
                        <button class="num" type="button">9</button>
                    </div>

                    <div class="right">
                        <button class="am" type="button">÷</button>
                        <button class="am" type="button">×</button>
                        <button class="am" type="button">-</button>
                        <button class="am" type="button">+</button>
                        <button class="am" type="button">CA</button>
                        <button class="am" type="button">√</button>
                        <button class="am" type="button">+/-</button>
                        <button class="am" type="button">=</button>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <script src="js/script.js"></script>
</body>

</html>
